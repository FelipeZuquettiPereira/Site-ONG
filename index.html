<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONG</title>
     <link rel="stylesheet" href="style.css">
    <script src="JavaScript.js"></script>
</head>
<body>
   <div class="centro">

  <h2>Somos um centro de doações para pinguins carentes!</h2>


  <form id="AdocaoPinguins">
    <label for="Nome">Nome:</label>
    <input type="text" id="nome">

    <br>
    <br>

    <label for="Email">Email:</label>
    <input type="email" id="email">

    <br>
    <br>

    <label for="Idade">Idade:</label>
    <select name="idades" id="idades">
        <option value="">Selecione</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
        <option value="9">9</option>
        <option value="10">10</option>
        <option value="11">11</option>
        <option value="12">12</option>
        <option value="13">13</option>
        <option value="14">14</option>
        <option value="15">15</option>
        <option value="16">16</option>
        <option value="17">17</option>
        <option value="18">18</option>
        <option value="19">19</option>
        <option value="20">20</option>
        <option value="21">21</option>
        <option value="22">22</option>
        <option value="23">23</option>
        <option value="24">24</option>
        <option value="25+">25+</option>
    </select>

     <br>
    <br>

    <label for="cpf">CPF:</label>
    <input type="number" id="cpf">

    <br>
    <br>

    <label for="pet">Já teve algum pinguim antes?</label>
    <input type="radio" value="sim" name="pet">sim
    <input type="radio" value="nao" name="pet">não

    <br>
    <br>

    <label for="Contato">
        Telefone:
        <input type="number" id="contato">
    </label>

    <br>
    <br>

    <label for="Cidade">
        Cidade:
        <input type="text"  id="cidade">
    </label>

    <br>
    <br>

    <label for="Moradia">
        Qual o tipo da sua moradia?
        <input type="radio" value="casa" name="Moradia">casa
        <input type="radio" value="apartamento" name="Moradia">apartamento
    </label>

    <br>
    <br>

    <label for="Quintal">
        Você tem quintal?
        <input type="radio" value="comquintal" name="Quintal">sim
        <input type="radio" value="semquintal" name="Quintal">não
    </label>

    <br>
    <br>

    <label for="HorasSozinho">
        Quanto tempo o pet passará sozinho por dia?(em horas) <br>
        <input type="number"  id="tempo_sozinho">
    </label>

    <br>
    <br>

    <label for="Motivo">
        Motivo da adoção: <br>
        <textarea name="Motivo" id="motivoAdoção"></textarea>
    </label>

    <br>
    <br>

    <label for="Termos">
        Aceitar Termos
        <input type="checkbox" name="Termos" id="Termos">
    </label>

    <br>
    <br>

    <input type="submit">

  </form>

    <div id="resultado"></div>

   </div>
</body>
</html>
